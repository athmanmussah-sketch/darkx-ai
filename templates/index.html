<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkX AI - Msaidizi wa Kisasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* Container yenye muonekano wa Kioo (Glassmorphism) */
        .container {
            width: 95%;
            max-width: 1000px;
            height: 85vh;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header */
        .header {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-blob {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Chat Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message { align-self: flex-end; }
        .bot-message { align-self: flex-start; }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Quick Actions - Vidonge vya maswali */
        .quick-actions {
            padding: 15px 25px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .quick-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .quick-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px 25px 30px;
            background: transparent;
        }

        .input-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            transition: 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            background: var(--secondary);
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-section">
            <div class="logo-blob">🤖</div>
            <div>
                <h1>DarkX AI</h1>
                <p style="font-size: 11px; color: var(--text-dim);">Next-Gen Swahili Intelligence</p>
            </div>
        </div>
        <div class="status">
            <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></span>
            Online
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <div class="message-content">
                Habari! Mimi ni <b>DarkX AI</b>. Una jambo gani leo? Nipo hapa kukusaidia kwa haraka na ufasaha zaidi. ✨
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuickQuestion('Nini maana ya AI?')">🤖 Maana ya AI</button>
        <button class="quick-btn" onclick="sendQuickQuestion('Nipe dondoo za afya')">❤️ Afya</button>
        <button class="quick-btn" onclick="sendQuickQuestion('Mbinu za biashara 2026')">💼 Biashara</button>
        <button class="quick-btn" onclick="clearChat()">🗑️ Safisha</button>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Andika ujumbe hapa..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendButton" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Tumia logic ile ile ya JavaScript uliyokuwa nayo awali hapa.
    // Nimebadilisha kidogo mfumo wa kuongeza ujumbe ili uendane na muonekano mpya.
    
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    let isLoading = false;

    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerHTML = `<div class="message-content">${text}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if(!msg || isLoading) return;

        addMessage(msg, true);
        userInput.value = '';
        isLoading = true;

        // Igiza typing indicator
        const typing = document.createElement('div');
        typing.className = 'message bot-message';
        typing.id = 'temp-typing';
        typing.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>`;
        chatMessages.appendChild(typing);

        try {
            // Hapa weka fetch yako ya API kama mwanzo
            // Kwa mfano huu, nimeiga jibu la bot:
            setTimeout(() => {
                document.getElementById('temp-typing').remove();
                addMessage("Samahani, server haijaunganishwa bado. Lakini muonekano wangu ni bomba, au siyo? 😎");
                isLoading = false;
            }, 1500);
        } catch (e) {
            document.getElementById('temp-typing').remove();
            isLoading = false;
        }
    }

    function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
    function sendQuickQuestion(q) { userInput.value = q; sendMessage(); }
    function clearChat() { chatMessages.innerHTML = ''; addMessage("Mazungumzo yamefutwa. Nianze kukusaidia nini?"); }
</script>
</body>
</html>
